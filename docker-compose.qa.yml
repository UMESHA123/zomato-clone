services:
  # ==================== Infrastructure ====================
  postgres:
    image: postgres:16-alpine
    container_name: zomato-postgres-qa
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zomato}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zomato_qa_secret}
      POSTGRES_DB: zomato_users
    volumes:
      - postgres_data_qa:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
      - ./docker/postgres/init-health-check.sql:/docker-entrypoint-initdb.d/init-health-check.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zomato}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - zomato-network-qa

  health-check-db-init:
    image: postgres:16-alpine
    container_name: zomato-health-check-db-init-qa
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-zomato_qa_secret}
    command:
      [
        "sh",
        "-c",
        "until pg_isready -h postgres -U ${POSTGRES_USER:-zomato}; do sleep 2; done; psql -h postgres -U ${POSTGRES_USER:-zomato} -d postgres -tc \"SELECT 1 FROM pg_database WHERE datname = 'zomato_health'\" | grep -q 1 || psql -h postgres -U ${POSTGRES_USER:-zomato} -d postgres -c \"CREATE DATABASE zomato_health\""
      ]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - zomato-network-qa

  mongodb:
    image: mongo:7
    container_name: zomato-mongodb-qa
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-zomato}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-zomato_qa_secret}
    volumes:
      - mongo_data_qa:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - zomato-network-qa

  redis:
    image: redis:7-alpine
    container_name: zomato-redis-qa
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-zomato_qa_secret}
    volumes:
      - redis_data_qa:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-zomato_qa_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - zomato-network-qa

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: zomato-rabbitmq-qa
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-zomato}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-zomato_qa_secret}
    volumes:
      - rabbitmq_data_qa:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - zomato-network-qa

  # ==================== Application Services ====================
  api-gateway:
    image: ${DOCKER_REGISTRY:-docker.io/umesa123}/zomato-api-gateway:${IMAGE_TAG:-latest}
    container_name: zomato-api-gateway-qa
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: qa
      API_GATEWAY_PORT: 8080
      USER_SERVICE_URL: http://user-service:8081
      RESTAURANT_SERVICE_URL: http://restaurant-service:8082
      ORDER_SERVICE_URL: http://order-service:8083
      DELIVERY_SERVICE_URL: http://delivery-service:8084
      PAYMENT_SERVICE_URL: http://payment-service:8085
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      CHAT_SERVICE_URL: http://chat-service:8087
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-zomato_qa_secret}
      FRONTEND_CUSTOMER_URL: http://frontend-customer:3000
      FRONTEND_RESTAURANT_URL: http://frontend-restaurant:3001
      FRONTEND_DRIVER_URL: http://frontend-driver:3002
      FRONTEND_AGENT_URL: http://frontend-agent:3003
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zomato-network-qa

  user-service:
    image: ${DOCKER_REGISTRY:-docker.io/umesa123}/zomato-user-service:${IMAGE_TAG:-latest}
    container_name: zomato-user-service-qa
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: qa
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-zomato}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zomato_qa_secret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-zomato}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-zomato_qa_secret}
      JWT_SECRET: ${JWT_SECRET:-zomato-jwt-qa-secret}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zomato-network-qa

  restaurant-service:
    image: ${DOCKER_REGISTRY:-docker.io/umesa123}/zomato-restaurant-service:${IMAGE_TAG:-latest}
    container_name: zomato-restaurant-service-qa
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: qa
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-zomato}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zomato_qa_secret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-zomato}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-zomato_qa_secret}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zomato-network-qa

  order-service:
    image: ${DOCKER_REGISTRY:-docker.io/umesa123}/zomato-order-service:${IMAGE_TAG:-latest}
    container_name: zomato-order-service-qa
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: qa
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-zomato}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zomato_qa_secret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-zomato}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-zomato_qa_secret}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zomato-network-qa

  delivery-service:
    image: ${DOCKER_REGISTRY:-docker.io/umesa123}/zomato-delivery-service:${IMAGE_TAG:-latest}
    container_name: zomato-delivery-service-qa
    ports:
      - "8084:8084"
    environment:
      NODE_ENV: qa
      DELIVERY_SERVICE_PORT: 8084
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER:-zomato}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-zomato_qa_secret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-zomato}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-zomato_qa_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-zomato_qa_secret}
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zomato-network-qa

  payment-service:
    image: ${DOCKER_REGISTRY:-docker.io/umesa123}/zomato-payment-service:${IMAGE_TAG:-latest}
    container_name: zomato-payment-service-qa
    ports:
      - "8085:8085"
    environment:
      NODE_ENV: qa
      PAYMENT_SERVICE_PORT: 8085
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-zomato}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zomato_qa_secret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-zomato}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-zomato_qa_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-zomato_qa_secret}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zomato-network-qa

  notification-service:
    image: ${DOCKER_REGISTRY:-docker.io/umesa123}/zomato-notification-service:${IMAGE_TAG:-latest}
    container_name: zomato-notification-service-qa
    ports:
      - "8086:8086"
    environment:
      NODE_ENV: qa
      NOTIFICATION_SERVICE_PORT: 8086
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-zomato}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-zomato_qa_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-zomato_qa_secret}
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zomato-network-qa

  chat-service:
    image: ${DOCKER_REGISTRY:-docker.io/umesa123}/zomato-chat-service:${IMAGE_TAG:-latest}
    container_name: zomato-chat-service-qa
    ports:
      - "8087:8087"
    environment:
      NODE_ENV: qa
      CHAT_SERVICE_PORT: 8087
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER:-zomato}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-zomato_qa_secret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-zomato}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-zomato_qa_secret}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FRONTEND_CUSTOMER_URL: http://frontend-customer:3000
      FRONTEND_AGENT_URL: http://frontend-agent:3003
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zomato-network-qa

  frontend-customer:
    image: ${DOCKER_REGISTRY:-docker.io/umesa123}/zomato-frontend-customer:${IMAGE_TAG:-latest}
    container_name: zomato-frontend-customer-qa
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: qa
      API_URL: http://api-gateway:8080
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - zomato-network-qa

  frontend-restaurant:
    image: ${DOCKER_REGISTRY:-docker.io/umesa123}/zomato-frontend-restaurant:${IMAGE_TAG:-latest}
    container_name: zomato-frontend-restaurant-qa
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: qa
      API_URL: http://api-gateway:8080
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
      PORT: "3001"
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - zomato-network-qa

  frontend-driver:
    image: ${DOCKER_REGISTRY:-docker.io/umesa123}/zomato-frontend-driver:${IMAGE_TAG:-latest}
    container_name: zomato-frontend-driver-qa
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: qa
      API_URL: http://api-gateway:8080
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
      PORT: "3002"
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - zomato-network-qa

  frontend-agent:
    image: ${DOCKER_REGISTRY:-docker.io/umesa123}/zomato-frontend-agent:${IMAGE_TAG:-latest}
    container_name: zomato-frontend-agent-qa
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: qa
      API_URL: http://api-gateway:8080
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_CHAT_SERVICE_URL: ${PUBLIC_CHAT_URL:-http://localhost:8087}
      PORT: "3003"
    depends_on:
      - api-gateway
      - chat-service
    restart: unless-stopped
    networks:
      - zomato-network-qa

  health-check-ui:
    image: ${DOCKER_REGISTRY:-docker.io/umesa123}/zomato-health-check-ui:${IMAGE_TAG:-latest}
    container_name: zomato-health-check-ui-qa
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: qa
      DATABASE_URL: postgresql://${POSTGRES_USER:-zomato}:${POSTGRES_PASSWORD:-zomato_qa_secret}@postgres:5432/zomato_health
      PORT: "3004"
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_TO: ${EMAIL_TO:-}
    depends_on:
      postgres:
        condition: service_healthy
      health-check-db-init:
        condition: service_completed_successfully
      api-gateway:
        condition: service_started
    restart: unless-stopped
    networks:
      - zomato-network-qa

volumes:
  postgres_data_qa:
  mongo_data_qa:
  redis_data_qa:
  rabbitmq_data_qa:

networks:
  zomato-network-qa:
    driver: bridge
    name: zomato-network-qa
