server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/zomato_users
    username: ${POSTGRES_USER:zomato}
    password: ${POSTGRES_PASSWORD:zomato_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:zomato}
    password: ${RABBITMQ_PASSWORD:zomato_secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: user-service
    export:
      prometheus:
        enabled: true

jwt:
  secret: ${JWT_SECRET:zomato-jwt-secret-change-in-production}
  expiration: 86400000
