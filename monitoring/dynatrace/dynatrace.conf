# Dynatrace OneAgent Configuration
# ===================================
# To use Dynatrace monitoring, you need:
# 1. A Dynatrace account (free trial available at https://www.dynatrace.com/trial/)
# 2. Your environment ID and API token
#
# Set these environment variables before running docker-compose:
#   DYNATRACE_ENVIRONMENT_ID=your-environment-id
#   DYNATRACE_API_TOKEN=your-api-token
#   DYNATRACE_PAAS_TOKEN=your-paas-token
#
# The Dynatrace OneAgent will automatically:
# - Discover all services in the Docker network
# - Instrument Java and Node.js processes
# - Collect metrics, traces, and logs
# - Provide AI-powered root cause analysis

[general]
# OneAgent communication settings
ServerAddress = https://${DYNATRACE_ENVIRONMENT_ID}.live.dynatrace.com

[connectivity]
# Network zone (optional)
# NetworkZone = default

[host]
# Host group for logical grouping
HostGroup = zomato-clone-local

[process]
# Auto-injection settings
AutoInjection = true
