global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'service', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'default-receiver'

receivers:
  - name: 'default-receiver'
    # Configuration for sending alerts can be specified here.
    # For example, to send to Slack:
    # slack_configs:
    #   - api_url: '<your_slack_webhook_url_here>'
    #     channel: '#alerts'
    # Or to Email:
    # email_configs:
    #   - to: 'your-email@example.com'
    #     from: 'prometheus@example.com'
    #     smarthost: smtp.gmail.com:587
    #     auth_username: 'your-email@example.com'
    #     auth_password: 'app-password'
