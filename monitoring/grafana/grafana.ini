[server]
http_port = 3000
root_url = http://localhost:3005

[security]
admin_user = admin
admin_password = zomato_admin

[users]
allow_sign_up = false

[auth.anonymous]
enabled = true
org_role = Viewer

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/json/microservices-overview.json

[log]
mode = console
level = info

[alerting]
enabled = true
