worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;

    # Upstream definitions
    upstream api_gateway {
        server api-gateway:8080;
    }

    upstream frontend_customer {
        server frontend-customer:3000;
    }

    upstream frontend_restaurant {
        server frontend-restaurant:3001;
    }

    upstream frontend_driver {
        server frontend-driver:3002;
    }

    upstream frontend_agent {
        server frontend-agent:3003;
    }

    upstream health_check_ui {
        server health-check-ui:3004;
    }

    upstream chat_service {
        server chat-service:8087;
    }

    # ---- HTTP → HTTPS redirect (enable when SSL is configured) ----
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # ---- Main server ----
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # API Gateway
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://api_gateway/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # WebSocket for chat service
        location /socket.io/ {
            proxy_pass http://chat_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }

        # Customer frontend (default)
        location / {
            proxy_pass http://frontend_customer;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Restaurant portal
        location /restaurant/ {
            proxy_pass http://frontend_restaurant/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Driver portal
        location /driver/ {
            proxy_pass http://frontend_driver/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Agent portal
        location /agent/ {
            proxy_pass http://frontend_agent/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check dashboard (restrict in production)
        location /health/ {
            proxy_pass http://health_check_ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Uncomment to restrict access:
            # allow 10.0.0.0/8;
            # deny all;
        }

        # Nginx health endpoint for load balancers
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
