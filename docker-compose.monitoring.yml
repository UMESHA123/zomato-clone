services:
  # ==================== Monitoring Stack ====================

  # Prometheus - Metrics collection and storage
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: zomato-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - zomato-network
    restart: unless-stopped

  # Grafana - Visualization and dashboards
  grafana:
    image: grafana/grafana:10.4.0
    container_name: zomato-grafana
    ports:
      - "3005:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-zomato_admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3005
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - zomato-network
    restart: unless-stopped

  # Loki - Log aggregation
  loki:
    image: grafana/loki:2.9.6
    container_name: zomato-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - zomato-network
    restart: unless-stopped

  # Promtail - Log shipper (collects logs from Docker containers)
  promtail:
    image: grafana/promtail:2.9.6
    container_name: zomato-promtail
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - zomato-network
    restart: unless-stopped

  # Node Exporter - Host-level metrics (CPU, memory, disk, network)
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: zomato-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - zomato-network
    restart: unless-stopped

  # Dynatrace OneAgent - APM (Application Performance Monitoring)
  # NOTE: Requires DYNATRACE_ENVIRONMENT_ID and DYNATRACE_PAAS_TOKEN env vars
  dynatrace-oneagent:
    image: dynatrace/oneagent:latest
    container_name: zomato-dynatrace
    privileged: true
    pid: "host"
    network_mode: "host"
    environment:
      - ONEAGENT_INSTALLER_SCRIPT_URL=https://${DYNATRACE_ENVIRONMENT_ID:-placeholder}.live.dynatrace.com/api/v1/deployment/installer/agent/unix/default/latest?Api-Token=${DYNATRACE_PAAS_TOKEN:-placeholder}
      - ONEAGENT_INSTALLER_DOWNLOAD_TOKEN=${DYNATRACE_PAAS_TOKEN:-placeholder}
    volumes:
      - /:/mnt/root:ro
      - oneagent_data:/opt/dynatrace/oneagent
    profiles:
      - dynatrace
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  oneagent_data:

networks:
  zomato-network:
    external: true
    name: zomato-clone_zomato-network
